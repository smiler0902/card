<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홍길동 — 디지털 명함</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-pattern" aria-hidden="true"></div>
  <main class="wrap">
    <article class="card" id="card">
      <div class="card__shine" aria-hidden="true"></div>
      <header class="card__header">
        <div class="avatar-scene" role="img" aria-label="40대 안경을 쓴 남성 캐릭터 프로필, 360도 회전">
          <div class="avatar-pivot">
            <div class="avatar-face avatar-face--front">
              <img src="assets/avatar-character.png" alt="" width="160" height="160" decoding="async" />
            </div>
            <div class="avatar-face avatar-face--back" aria-hidden="true">
              <img src="assets/avatar-character.png" alt="" width="160" height="160" decoding="async" />
            </div>
          </div>
        </div>
        <div class="card__titles">
          <h1 class="name">홍길동</h1>
          <p class="role">건설회사 경영기획 담당자</p>
        </div>
      </header>
      <p class="tagline">현장의 흐름과 숫자를 맞추며, 실행 가능한 계획을 만듭니다.</p>
      <ul class="contacts">
        <li>
          <a class="contact-link" href="mailto:honggildong@naver.com" id="emailLink">
            <span class="contact-label">이메일</span>
            <span class="contact-value">honggildong@naver.com</span>
          </a>
          <button type="button" class="btn-copy" id="copyEmail" title="이메일 주소 복사" aria-label="이메일 주소 복사">복사</button>
        </li>
        <li>
          <a class="contact-link" href="tel:01000000000" id="phoneLink">
            <span class="contact-label">연락처</span>
            <span class="contact-value">010-0000-0000</span>
          </a>
          <button
            type="button"
            class="btn-copy"
            id="copyPhone"
            title="연락처 파일로 저장 (휴대폰에서 공유 또는 다운로드)"
            aria-label="연락처에 저장하기"
          >
            저장
          </button>
        </li>
      </ul>
      <div class="qr-block">
        <p class="qr-label">디지털 명함</p>
        <a
          class="qr-link"
          href="https://smiler0902.github.io/card/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="이 디지털 명함 페이지 열기 (QR 코드)"
        >
          <img
            class="qr-img"
            src="assets/qrcode-card.png"
            width="132"
            height="132"
            alt="https://smiler0902.github.io/card/ 로 연결되는 QR 코드"
            decoding="async"
          />
        </a>
        <p class="qr-hint">스캔하거나 눌러 이동 · smiler0902.github.io/card</p>
      </div>
      <p class="toast" id="toast" role="status" aria-live="polite"></p>
    </article>
    <p class="footer-hint">프로필은 360° 회전합니다 · 명함을 살짝 기울여 보세요</p>
  </main>
  <script src="tilt.js?v=1"></script>
  <script>
    (function () {
      var copyBtn = document.getElementById("copyEmail");
      var copyPhoneBtn = document.getElementById("copyPhone");
      var toast = document.getElementById("toast");
      var emailLink = document.getElementById("emailLink");
      var phoneLink = document.getElementById("phoneLink");
      var toastTimer;

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("is-visible");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("is-visible");
        }, 2200);
      }

      function emailToCopy() {
        if (!emailLink) return "";
        var shown = emailLink.querySelector(".contact-value");
        if (shown && shown.textContent) {
          var t = shown.textContent.trim();
          if (t) return t;
        }
        var href = emailLink.getAttribute("href") || "";
        if (!/^mailto:/i.test(href)) return "";
        var path = href.slice(7).split(/[?#]/)[0];
        try {
          return decodeURIComponent(path);
        } catch (e) {
          return path;
        }
      }

      function contactName() {
        var nameEl = document.querySelector(".card .name");
        return nameEl && nameEl.textContent ? nameEl.textContent.trim() : "";
      }

      function contactPhone() {
        var phoneVal = phoneLink && phoneLink.querySelector(".contact-value");
        return phoneVal && phoneVal.textContent ? phoneVal.textContent.trim() : "";
      }

      function contactEmailForVcard() {
        if (!emailLink) return "";
        var ev = emailLink.querySelector(".contact-value");
        return ev && ev.textContent ? ev.textContent.trim() : "";
      }

      function safeFileName(s) {
        return s.replace(/[\\/:*?"<>|]/g, "_").trim() || "contact";
      }

      function buildVCard() {
        var name = contactName();
        var phone = contactPhone();
        var email = contactEmailForVcard();
        var phoneDigits = phone.replace(/\D/g, "");
        var lines = [
          "BEGIN:VCARD",
          "VERSION:3.0",
          "FN:" + name,
          "N:;" + name + ";;;",
          "TEL;TYPE=CELL:" + (phoneDigits || phone)
        ];
        if (email) lines.push("EMAIL;TYPE=INTERNET:" + email);
        lines.push("END:VCARD");
        return lines.join("\r\n");
      }

      function downloadVcf(blob, fname) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = fname;
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      if (copyBtn) {
        copyBtn.addEventListener("click", function () {
          var email = emailToCopy();
          if (!email) {
            showToast("복사할 이메일을 찾을 수 없습니다.");
            return;
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(email).then(function () {
              showToast("이메일이 복사되었습니다.");
            }).catch(function () {
              showToast("복사에 실패했습니다. 주소를 직접 선택해 주세요.");
            });
          } else {
            showToast("이 브라우저에서는 메일 링크를 이용해 주세요.");
          }
        });
      }

      if (copyPhoneBtn) {
        copyPhoneBtn.addEventListener("click", function () {
          var name = contactName();
          var phone = contactPhone();
          if (!name && !phone) {
            showToast("연락처 정보를 찾을 수 없습니다.");
            return;
          }

          var vcard = buildVCard();
          var blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
          var fname = safeFileName(name || "contact") + ".vcf";
          var file = null;
          try {
            if (typeof File !== "undefined") {
              file = new File([blob], fname, { type: "text/vcard", lastModified: Date.now() });
            }
          } catch (e) {
            file = null;
          }

          var canShareFile = false;
          if (navigator.share && file) {
            if (!navigator.canShare) {
              canShareFile = true;
            } else {
              try {
                canShareFile = navigator.canShare({ files: [file] });
              } catch (e) {
                canShareFile = false;
              }
            }
          }

          if (canShareFile) {
            navigator
              .share({
                files: [file],
                title: name ? name + " 연락처" : "연락처",
                text: "연락처를 저장하세요"
              })
              .then(function () {
                showToast("연락처 저장을 완료했습니다.");
              })
              .catch(function (err) {
                if (err && err.name === "AbortError") return;
                downloadVcf(blob, fname);
                showToast("연락처 파일을 저장했습니다. 파일을 열어 추가하세요.");
              });
          } else {
            downloadVcf(blob, fname);
            showToast("연락처 파일을 저장했습니다. 파일을 열어 연락처에 추가하세요.");
          }
        });
      }
    })();
  </script>
</body>
</html>
